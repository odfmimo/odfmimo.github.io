<!DOCTYPE html>
<html>
    <head>
        <style>
            textarea { width: 100%; height: 10em; }
            #output_div textarea { width: 100%; height: 20em; }
        </style>
    </head>
    <body>
        <textarea id="input_textarea"></textarea>
        <div id="output_div"></div>
        <script>
            document.querySelector("#input_textarea").addEventListener("change", _ => {
                document.querySelector("#output_div").innerHTML = "";
                let input_data = document.querySelector("#input_textarea").value;

                document.querySelector("#output_div").innerHTML = input_data.split("\n").map(data => {
                    try {
                        data = JSON.parse(data.replace(/^data:\s*/, ''));
                        return data?.choices?.map(choice => choice?.delta?.content).join("");
                    } catch (e) { }
                }).filter(content => content).join("");
            });
        </script>
    </body>
</html>
